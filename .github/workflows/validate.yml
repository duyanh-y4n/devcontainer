name: Validate Profiles

on:
  pull_request:
    paths:
      - 'profiles/**'
  push:
    branches:
      - master
    paths:
      - 'profiles/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install dpod-seed
        run: go install github.com/iamy4n-dev/dpod-seed@latest

      - name: Validate profile content
        run: dpod-seed validate repo
